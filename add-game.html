<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/css/app.css">

</head>

<body>

    <main class="primary-font">

        <!-- mobile nav -->
        <div class="collapse d-md-none background-secondary" id="mobileNav">
            <div class="background-dark p-3">
                <a class="d-block mb-3 text-white text-decoration-none" href="home.html"><i
                        class="bi bi-house-door-fill"></i> Home</a>
                <a class="d-block mb-3 text-white text-decoration-none" href="home.html"><i
                        class="bi bi-door-open-fill"></i> Login</a>
                <a class="d-block mb-1 text-white text-decoration-none" href=""><i class="bi bi-plus-lg"></i> Add
                    Game</a>
            </div>
        </div>
        <nav class="navbar navbar-dark background-dark d-md-none">
            <div class="container-fluid">
                <a class="brand-name m-1" href="home.html"><img class="logo" src="/images/scroll-icon-6.png"
                        alt="">Questly</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav"
                    aria-controls="mobileNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>

        <div id="app" class="container-fluid">
            <div class="row vh-100">
                <div class="d-none d-md-block col-md-2 p-0">
                    <nav id="sidebar" class="h-100 flex-column align-items-stretch border-end background-dark p-2">
                        <nav class="nav nav-pills flex-column">
                            <a class="brand-name m-1" href="home.html"><img class="logo" src="/images/scroll-icon-6.png"
                                    alt="">Questly</a>
                            <hr>
                            <a class="nav-link nav-options btn-hover mb-2" href="home.html">Home</a>
                            <div class="accordion" id="gameAccordion">
                                <div class="accordion-item border border-0">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                            data-bs-target="#gameCollapse" aria-expanded="true"
                                            aria-controls="gameCollapse">
                                            My Games
                                        </button>
                                    </h2>
                                    <div id="gameCollapse" class="accordion-collapse" data-bs-parent="#gameAccordion">
                                        <div class="accordion-body background-secondary p-0">
                                            <a class="nav-link nav-options w-100 btn-hover overflow-y-hidden"
                                                v-for="(game, g) in gameList" :key="game.name"
                                                href="game-info.html">{{game.name}}</a>
                                            <a class="nav-link nav-options btn-hover active-page"
                                                href="add-game.html">Add
                                                Game</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </nav>
                        <button class="btn btn-primary background-secondary border border-0 sidebar-login-btn btn-hover"
                            data-bs-toggle="modal" data-bs-target="#loginModal">Log in or Create Account</button>
                    </nav>
                </div>

                <div class="col-12 col-md-10 background-primary">
                    <h1 class="pt-4 pb-4 text-black text-center">Add a New Game</h1>

                    <div class="container-fluid d-flex justify-content-center">

                        <form @submit.prevent="addNewGame()" class="w-75">

                            <div class="row mb-3">

                                <div class="col-12 col-sm-8">
                                    <label for="name" class="form-label">Name</label>
                                    <input id="name" type="text" class="form-control" v-model="newGame.name" required>

                                </div>

                                <div class="col-12 col-sm-4">

                                    <label for="platform" class="form-label">Platform</label>
                                    <select id="category" class="form-select" v-model="newGame.platform" required>
                                        <option value="steam">Steam</option>
                                        <option value="xbox">Xbox</option>
                                        <option value="playstation">PlayStation</option>
                                    </select>

                                </div>

                            </div>



                            <label for="image" class="form-label">Image Filename</label>
                            <input id="image" type="text" class="form-control" v-model="newGame.image"
                                placeholder="https://placehold.co/600x400">

                            <button type="submit" class="btn submit-button mt-4 d-block mx-auto">Add Game</button>



                        </form>

                    </div>


                </div>
            </div>
        </div>


    </main>


    <div class="modal" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content background-dark">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 text-white" id="loginModalLabel">Login or Create Account</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label text-white">Email address</label>
                            <input type="email" class="form-control" id="inputEmail" aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text text-white"></div>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword" class="form-label text-white">Password</label>
                            <input type="password" class="form-control" id="inputPassword">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-dark">Log in</button>
                </div>
            </div>
        </div>
    </div>


    <footer
        class="background-dark text-center border-top border-light-subtle text-lg-start text-light mt-4 fixed-bottom primary-font">

        <div class="text-center pb-4 mt-4">
            © 2026 Hannah Kraemer
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Vue Application -->
    <script type="module">
        // create the app
        import app from './js/app.js';

        // tell it to run on the div #app
        app.mount('#app');
    </script>

</body>



</html>
