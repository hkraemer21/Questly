<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questly</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

    <main class="primary-font">

        <!-- mobile nav -->
        <div class="collapse d-md-none background-secondary" id="mobileNav">
            <div class="background-dark p-4">
                <a class="d-block mb-2 text-white text-decoration-none" href="home.html">Home</a>
                <a class="d-block mb-2 text-white text-decoration-none" href=""><i class="bi bi-plus-lg"></i> Add
                    Game</a>
            </div>
        </div>
        <nav class="navbar navbar-dark background-dark d-md-none">
            <div class="container-fluid">
                <a class="brand-name m-3" href="home.html"><img class="logo" src="/images/scroll-icon-6.png"
                        alt="">Questly</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav"
                    aria-controls="mobileNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>

        <div id="app" class="container-fluid">
            <div class="row vh-100">
                <div class="d-none d-md-block col-md-3 p-0">
                    <nav id="sidebar"
                        class="h-100 flex-column align-items-stretch pe-4 border-end background-secondary">
                        <nav class="nav nav-pills flex-column p-4">
                            <a class="brand-name m-3" href="home.html"><img class="logo" src="/images/scroll-icon-6.png"
                                    alt="">Questly</a>
                            <hr>
                            <a class="nav-link nav-options btn-hover" href="home.html">Home</a>
                            <a class="nav-link nav-options btn-hover" href="">My Games</a>
                            <nav class="nav nav-pills flex-column background-dark w-100 rounded">
                                <a class="nav-link nav-options w-100 m-3 my-1 btn-hover overflow-y-hidden" v-for="(game, g) in gameList" :key="game.name"
                                    href="resident-evil.html">{{game.name}}</a>
                            </nav>
                        </nav>
                        <button class="btn btn-primary background-dark border border-0 sidebar-login-btn btn-hover"
                            data-bs-toggle="modal" data-bs-target="#loginModal">Log in or Create Account</button>
                    </nav>
                </div>

                <div class="col-12 col-md-9 background-primary">
                    <div data-bs-spy="scroll" data-bs-target="#navbar-example3" data-bs-smooth-scroll="true"
                        class="scrollspy-example-2" tabindex="0">
                        <div id="">
                            <h1 class="pt-4 ps-4 pb-4 text-black">Start tracking your achievements</h1>
                            <div class="container-fluid">

                                <div class="row">

                                    <div class="col-sm-6 col-lg-3" v-for="(game, g) in gameList" :key="game.name">

                                        <div class="card game-card" style="width: 100%;">
                                            <img src="/images/re2remake.jpeg" class="card-img-top" alt="...">
                                            <div class="card-img-overlay d-flex align-items-end p-0">
                                                <div class="card-body bg-dark bg-opacity-75">
                                                    <a class="card-text text-white text-center w-100 mb-0" href="">{{
                                                        game.name }}</a>
                                                </div>
                                            </div>
                                        </div>

                                    </div>

                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </main>


    <div class="modal" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content background-dark">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 text-white" id="loginModalLabel">Login or Create Account</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label text-white">Email address</label>
                            <input type="email" class="form-control" id="inputEmail" aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text text-white"></div>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword" class="form-label text-white">Password</label>
                            <input type="password" class="form-control" id="inputPassword">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-dark">Log in</button>
                </div>
            </div>
        </div>
    </div>


    <footer
        class="background-dark text-center border-top border-light-subtle text-lg-start text-light mt-4 fixed-bottom primary-font">

        <div class="text-center pb-4 mt-4">
            © 2026 Hannah Kraemer
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Vue Application -->
    <script type="module">
        // create the app
        import app from './js/app.js';

        // tell it to run on the div #app
        app.mount('#app');
    </script>

</body>



</html>
