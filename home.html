<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questly</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>

        <div class="container-fluid primary-font">
            <div class="row vh-100">
                <div class="col-3 px-1 background-secondary position-fixed pb-5" id="sticky-sidebar">
                    <div class="d-flex flex-column flex-shrink-0 py-3 background-secondary"
                        style="width: 100%; height: calc(100vh - 90px);"> <a href="/"
                            class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                            <svg class="bi pe-none me-2" width="40" height="32" aria-hidden="true">
                                <use xlink:href="#bootstrap"></use>
                            </svg> <span class="fs-4"><img class="logo" src="/images/scroll-icon-6.png"
                                    alt="">Questly</span> </a>
                        <hr>
                        <ul class="nav nav-pills flex-column mb-auto p-3">
                            <li class="nav-item pb-2"> <a href="#" class="nav-link active text-white pt-3 pb-3"
                                    aria-current="page"> <svg class="bi pe-none me-2" width="16" height="16"
                                        aria-hidden="true">
                                        <use xlink:href="#home"></use>
                                    </svg>
                                    Home
                                </a> </li>
                            <li>
                                <div class="accordion" id="myGamesAccordion">
                                    <div class="accordion-item">
                                        <h2 class="accordion-header border border-0">
                                            <button class="accordion-button collapsed border border-0" type="button"
                                                data-bs-toggle="collapse" data-bs-target="#collapseOne"
                                                aria-expanded="false" aria-controls="collapseOne">
                                                My Games
                                            </button>
                                        </h2>
                                        <div id="collapseOne" class="accordion-collapse collapse"
                                            data-bs-parent="#myGamesAccordion">
                                            <div class="accordion-body background-dark">
                                                <ul class="">
                                                    <li class="p-3 btn-hover text-white"><a href="">Resident Evil 2
                                                            Remake</a></li>
                                                    <li class="p-3 btn-hover text-white"><a href="">God of War:
                                                            Ragnarok</a></li>
                                                    <li class="p-3 btn-hover text-white"><a href="">The Last of Us Part
                                                            II</a></li>
                                                    <li class="p-3 btn-hover text-white"><a href=""><i
                                                                class="bi bi-plus-lg"></i> Add Game</a></li>

                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </li>
                        </ul>
                        <div class="background-dark">
                            <button
                                class="btn btn-primary background-dark text-white border border-0 btn-hover mt-3 mb-3 pt-3 pb-3 position-absolute bottom-0 start-50 translate-middle-x"
                                data-bs-toggle="modal" data-bs-target="#loginModal"
                                style="width: 100%; font-size: x-large;">Log in or Create Account</button>



                        </div>
                    </div>
                </div>


                <div class="col offset-3 background-primary" id="main">
                    <h1 class="pt-4 ps-4 text-black">Start tracking your achievements</h1>

                    <div class="container-fluid">

                        <div class="row p-4">

                            <div class="col-sm-6 col-lg-3">

                                <div class="card game-card" style="width: 100%;">
                                    <img src="/images/re2remake.jpeg" class="card-img-top" alt="...">
                                    <div class="card-img-overlay d-flex align-items-end p-0">
                                        <div class="card-body bg-dark bg-opacity-75">
                                            <a class="card-text text-white text-center w-100 mb-0" href="">Resident Evil
                                                2
                                                Remake</a>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div class="col-sm-6 col-lg-3">

                                <div class="card game-card" style="width: 100%;">
                                    <img src="/images/gowragnarok.jpg" class="card-img-top" alt="...">
                                    <div class="card-img-overlay d-flex align-items-end p-0">
                                        <div class="card-body bg-dark bg-opacity-75">
                                            <a class="card-text text-white text-center w-100 mb-0" href="">God of War:
                                                Ragnarok
                                            </a>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div class="col-sm-6 col-lg-3">

                                <div class="card game-card" style="width: 100%;">
                                    <img src="/images/tloup2.jpg" class="card-img-top" alt="...">
                                    <div class="card-img-overlay d-flex align-items-end p-0">
                                        <div class="card-body bg-dark bg-opacity-75">
                                            <a class="card-text text-white text-center w-100 mb-0" href="">The Last of
                                                Us Part
                                                II</a>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div class="col-sm-6 col-lg-3">

                                <div class="card border border-dark background-primary position-relative"
                                    style="width: 100%; height: 100%;">

                                    <button
                                        class="btn btn-primary background-primary text-black border border-0 position-absolute top-50 start-50 translate-middle btn-hover"
                                        style="width: 80%; font-size: x-large;"><i class="bi bi-plus-lg"></i> Add
                                        Game</button>

                                </div>

                            </div>


                        </div>

                    </div>

                </div>
            </div>
        </div>





    </main>


    <div class="modal" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content background-secondary">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 text-white" id="loginModalLabel">Login or Create Account</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label text-white">Email address</label>
                            <input type="email" class="form-control" id="inputEmail"
                                aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text text-white"></div>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword" class="form-label text-white">Password</label>
                            <input type="password" class="form-control" id="inputPassword">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-dark">Log in</button>
                </div>
            </div>
        </div>
    </div>


    <footer
        class="background-secondary text-center border-top border-light-subtle text-lg-start text-light mt-4 fixed-bottom">

        <div class="text-center pb-4 mt-4">
            © 2026 Hannah Kraemer
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>



</html>
