                <li class="nav-item">
                    <a class="brand-name m-1" href="home.html"><img class="logo" src="/images/scroll-icon-6.png"

                    <img src="/images/header-divider.png" alt="header divider" class="header-divider mb-4">

                        <div class="row">

                            <div class="col-12 col-md-3 border border-2 border-black text-center pt-4">

                                <a href="" class="btn fw-bolder fst-italic">New Game</a>
                                <img src="/images/game-title-divider.png" alt="header divider"
                                    class="game-divider mb-2">

                                <!-- desktop version of game list -->
                                <ul class="ps-2 desktop" v-for="(game, g) in gameList" :key="game.name">

                                    <li class="mt-3 text-break fw-bold">
                                        <a href="#" class="text-decoration-none text-black"
                                            @click.prevent="selectGame(game)">{{ game.name }}</a>
                                        <hr>
                                    </li>

                                </ul>

                                <!-- mobile version of game list -->
                                <select class="form-select form-select-lg mb-3 mobile" aria-label="Game select">
                                    <option selected v-for="(game, g) in gameList" :key="game.name" class="fw-bold">
                                        {{ game.name }}
                                    </option>
                                </select>


                            </div>

                            <div
                                class="col-12 col-md-9 border border-2 border-black d-flex flex-column align-items-center justify-content-start">

                                    <div class="text-center">
                                        <div class="row">
                                            <div class="col-1 position-relative ">
                                                <a href="" class="position-absolute top-0 end-0 text-black">
                                                    <img :src="selectedGame.pin ? '/images/waypoint-filled.png' : '/images/waypoint.png'"
                                                        alt="" class="pin-img">
                                                </a>
                                            </div>
                                            <div class="col-1 position-relative ">
                                            </div>
                                            <div class="col-8">
                                                <h2 class="text-break">{{ selectedGame.name }} <i
                                                        :class="selectedGame.favorite ? 'bi bi-star-fill' : 'bi bi-star text-secondary'"></i>
                                                </h2>
                                            </div>
                                            <div class="col-1 position-relative ">
                                            </div>
                                            <div class="col-1 position-relative">
                                                <a href="" class="position-absolute top-0 end-0 text-black">
                                                    <img src="/images/quill.png" alt="" class="quill-img">
                                                </a>
                                            </div>
                                        </div>
                                        <p class="mb-2"><strong>Platform:</strong> {{ selectedGame.platform }}</p>
                                        <div class="game-img-wrap">
                                            <img :src="'/images/' + selectedGame.image"
                                                :alt="selectedGame.name + ' image'" class="game-img mb-2">
                                        </div>
                                        <img src="/images/game-divider.png" alt="" class="game-divider">
                                    </div>

                                    <h3 class="h3 text-center">Achievements</h3>
                                    <ul class="ps-3">
                                        <li v-for="(achievement, a) in selectedGame.achievements" :key="a" class="mb-2">
                                            <strong>{{ achievement.name }}</strong>
                                            <div>{{ achievement.description }}</div>
                                        </li>
                                    </ul>
