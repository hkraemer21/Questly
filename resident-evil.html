<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>

        <div class="collapse d-md-none" id="mobileNav" data-bs-theme="dark">
            <div class="bg-dark p-4">
                <a class="d-block mb-2 text-white text-decoration-none" href="home.html">Home</a>
                <a class="d-block mb-2 text-white text-decoration-none" href="">My Games</a>
                <a class="d-block text-white text-decoration-none" href="resident-evil.html">Resident Evil 2 Remake</a>
            </div>
        </div>
        <nav class="navbar navbar-dark bg-dark d-md-none">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mobileNav" aria-controls="mobileNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="row primary-font vh-100">
                <div class="d-none d-md-block col-md-3 p-0">
                    <nav id="sidebar"
                        class="h-100 flex-column align-items-stretch pe-4 border-end background-secondary">
                        <nav class="nav nav-pills flex-column p-4">
                            <a class="brand-name m-3" href=""><img class="logo" src="/images/scroll-icon-6.png"
                                    alt="">Questly</a>
                            <hr>
                            <a class="nav-link nav-options btn-hover" href="home.html">Home</a>
                            <a class="nav-link nav-options btn-hover" href="">My Games</a>
                            <nav class="nav nav-pills flex-column background-dark w-100 rounded">
                                <a class="nav-link nav-options w-100 m-3 my-1 btn-hover overflow-y-hidden"
                                    href="resident-evil.html">Resident Evil 2 Remake</a>
                                <a class="nav-link nav-options m-3 my-1 btn-hover overflow-y-hidden" href="">God of War:
                                    Ragnarok</a>
                                <a class="nav-link nav-options m-3 my-1 btn-hover overflow-y-hidden" href="">The Last of
                                    Us Part
                                    II</a>
                            </nav>
                        </nav>
                        <button class="btn btn-primary background-dark border border-0 sidebar-login-btn btn-hover"
                            data-bs-toggle="modal" data-bs-target="#loginModal">Log in or Create Account</button>
                    </nav>
                </div>

                <div class="col-12 col-md-9 background-primary">
                    <div data-bs-spy="scroll" data-bs-target="#navbar-example3" data-bs-smooth-scroll="true"
                        class="scrollspy-example-2" tabindex="0">
                        <div id="">
                            <div class="container-fluid">

                                <div class="card mb-3 mt-3 background-dark text-white" style="width: 100%;">
                                    <div class="row g-0">
                                        <div class="col-md-4">
                                            <img src="/images/re2remake.jpeg" class="img-fluid rounded-start h-100" alt="...">
                                        </div>
                                        <div class="col-md-8 position-relative">
                                            <div class="card-body game-card-body">
                                                <h2 class="card-title position-absolute top-50 start-50 translate-middle text-center">Resident Evil 2 Remake</h2>
                                                <span class="position-absolute top-0 end-0 p-3"><i class="bi bi-star-fill"></i></span>
                                                <span class="position-absolute bottom-0 end-0 p-3"><i class="bi bi-pencil-square"></i></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>


                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>


    <div class="modal" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content background-dark">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 text-white" id="loginModalLabel">Login or Create Account</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label text-white">Email address</label>
                            <input type="email" class="form-control" id="inputEmail" aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text text-white"></div>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword" class="form-label text-white">Password</label>
                            <input type="password" class="form-control" id="inputPassword">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-dark">Log in</button>
                </div>
            </div>
        </div>
    </div>


    <footer
        class="background-dark text-center border-top border-light-subtle text-lg-start text-light mt-4 fixed-bottom">

        <div class="text-center pb-4 mt-4">
            © 2026 Hannah Kraemer
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
